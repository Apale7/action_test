name: Test Feishu App Bot Card Message

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      message-type:
        description: '卡片类型'
        required: true
        default: 'pipeline'
        type: choice
        options:
          - pipeline
          - success
          - alert

jobs:
  send-pipeline-card:
    name: 发送流水线通知卡片
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.message-type == 'pipeline'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send Pipeline Card to Group
        uses: Apale7/feishu-bot-action@master
        with:
          bot-type: 'app'
          app-id: ${{ secrets.FEISHU_APP_ID }}
          app-secret: ${{ secrets.FEISHU_APP_SECRET }}
          receive-type: 'chat_id'
          receive-id: oc_934c7dc526391bf74ac12ee55409675c
          msg-type: 'interactive'
          message: |
            {
              "config": {
                "wide_screen_mode": true
              },
              "header": {
                "title": {
                  "tag": "plain_text",
                  "content": "🚀 流水线构建通知"
                },
                "template": "blue"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**项目名称：** ${{ github.repository }}\n**构建状态：** ✅ 运行中\n**触发分支：** ${{ github.ref_name }}\n**触发者：** ${{ github.actor }}\n**事件类型：** ${{ github.event_name }}"
                  }
                },
                {
                  "tag": "hr"
                },
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**构建详情**\n- 提交ID：${{ github.sha }}\n- 提交信息：${{ github.event.head_commit.message || 'N/A' }}"
                  }
                },
                {
                  "tag": "action",
                  "actions": [
                    {
                      "tag": "button",
                      "text": {
                        "tag": "plain_text",
                        "content": "查看构建详情"
                      },
                      "type": "primary",
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    },
                    {
                      "tag": "button",
                      "text": {
                        "tag": "plain_text",
                        "content": "查看代码"
                      },
                      "type": "default",
                      "url": "${{ github.server_url }}/${{ github.repository }}"
                    }
                  ]
                },
                {
                  "tag": "note",
                  "elements": [
                    {
                      "tag": "plain_text",
                      "content": "此消息由 GitHub Action 自动发送"
                    }
                  ]
                }
              ]
            }

  send-success-card:
    name: 发送成功通知卡片
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.message-type == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send Success Card to Group
        uses: Apale7/feishu-bot-action@master
        with:
          bot-type: 'app'
          app-id: ${{ secrets.FEISHU_APP_ID }}
          app-secret: ${{ secrets.FEISHU_APP_SECRET }}
          receive-type: 'chat_id'
          receive-id: oc_934c7dc526391bf74ac12ee55409675c
          msg-type: 'interactive'
          message: |
            {
              "header": {
                "title": {
                  "tag": "plain_text",
                  "content": "✅ 构建成功通知"
                },
                "template": "green"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**项目：** ${{ github.repository }}\n\n项目已成功构建并通过所有测试！"
                  }
                },
                {
                  "tag": "div",
                  "fields": [
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "**分支**\n${{ github.ref_name }}"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "**提交者**\n${{ github.actor }}"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "**提交ID**\n${{ github.sha }}"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "**运行时间**\n$(date '+%Y-%m-%d %H:%M:%S')"
                      }
                    }
                  ]
                },
                {
                  "tag": "action",
                  "actions": [
                    {
                      "tag": "button",
                      "text": {
                        "tag": "plain_text",
                        "content": "查看详情"
                      },
                      "type": "primary",
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  send-alert-card:
    name: 发送告警通知卡片
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.message-type == 'alert'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send Alert Card to Group
        uses: Apale7/feishu-bot-action@master
        with:
          bot-type: 'app'
          app-id: ${{ secrets.FEISHU_APP_ID }}
          app-secret: ${{ secrets.FEISHU_APP_SECRET }}
          receive-type: 'chat_id'
          receive-id: oc_934c7dc526391bf74ac12ee55409675c
          msg-type: 'interactive'
          message: |
            {
              "config": {
                "wide_screen_mode": true
              },
              "header": {
                "title": {
                  "tag": "plain_text",
                  "content": "🚨 系统告警通知"
                },
                "template": "red"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**告警级别：** ⚠️ 中等\n**告警来源：** GitHub Action Workflow\n**告警时间：** $(date '+%Y-%m-%d %H:%M:%S')"
                  }
                },
                {
                  "tag": "hr"
                },
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**告警详情**\n- 仓库：${{ github.repository }}\n- 分支：${{ github.ref_name }}\n- 触发者：${{ github.actor }}\n- 事件：${{ github.event_name }}"
                  }
                },
                {
                  "tag": "note",
                  "elements": [
                    {
                      "tag": "plain_text",
                      "content": "请及时处理此告警"
                    }
                  ]
                }
              ]
            }